swagger: '2.0'
info:
  title: Basic Login Form
  version: 1.0.0
  description: Serves a safe, plain HTML login form

paths:
  /test:
    get:
      summary: Simple login
      produces: [text/html]
      responses:
        200:
          description: Login form
          x-amazon-apigateway-integration:
            type: mock
            responses:
              default:
                statusCode: "200"
                responseTemplates:
                  text/html: |
                    <!DOCTYPE html><title>Login</title><h2>Login</h2><form method=post><p>Username: <input name=username required></p><p>Password: <input type=password name=password required></p><p><input type=submit value=Login></p></form>
